# A solution is a collection of related projects that share same base configuration.
solution:
  created-for: CMSIS-Toolbox@2.12.0
  cdefault:

  # List of tested compilers that can be selected
  select-compiler:
    - compiler: AC6

  # Miscellaneous toolchain controls directly passed to the tools
  misc:
    - for-compiler: AC6 # change to -gdwarf-4 for debugging using uVision
      C-CPP:
        - -gdwarf-5
      ASM:
        - -gdwarf-5

  # List the packs that define the device and/or board.
  packs:
    - pack: Keil::STM32F4xx_DFP@^3.0.0-0
    - pack: Keil::STM32F407G-DISC1_BSP@^1.0.0-0
    - pack: ARM::CMSIS-Driver_STM32@^1.0.0-0
    - pack: ARM::CMSIS@^6.0.0
    - pack: ARM::CMSIS-RTX@^5.9.0
    - pack: ARM::CMSIS-Compiler@^2.0.0

  # List different hardware targets that are used to deploy the solution.
  target-types:
    - type: STM32F407G-DISC1
      board: STMicroelectronics::STM32F407G-DISC1
      device: STMicroelectronics::STM32F407VGTx
      target-set:
        - set:
          images:
            - project-context: ozone-sim-blinky.Debug

  # List of different build configurations.
  build-types:
    - type: Debug
      debug: on
      optimize: debug

    - type: Release
      debug: off
      optimize: balanced

    # Hardware-free build for the SEGGER Ozone-Sim instruction-set simulator.
    # OZONE_SIM routes stdio to semihosting and ends the run after a few
    # blink cycles (see retarget_stdio.c and blinky.c).
    - type: Sim
      debug: on
      optimize: none
      define:
        - OZONE_SIM

  # List related projects.
  projects:
    - project: ozone-sim-blinky.cproject.yml
  compiler: AC6
